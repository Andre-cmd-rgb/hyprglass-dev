general {
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# 5 min — dim backlight to 20% (laptop battery saver).
# brightnessctl -s saves current level; -r restores it on resume.
# The guard ensures this is a no-op on systems without brightnessctl.
listener {
    timeout    = 300
    on-timeout = command -v brightnessctl >/dev/null && brightnessctl -s set 20% || true
    on-resume  = command -v brightnessctl >/dev/null && brightnessctl -r || true
}

# 10 min — lock the session.
listener {
    timeout    = 600
    on-timeout = loginctl lock-session
}

# 15 min — turn off display via DPMS; restore on any input.
listener {
    timeout    = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 30 min — suspend on sustained idle. This is laptop-oriented and intentionally
# comes after lock + DPMS so brief pauses do not suspend the machine.
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
