# ── Hyprland autostart ───────────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = mako
exec-once = hypridle

# Polkit authentication agent — required for sudo GUI prompts (pkexec etc.)
# polkit-gnome must be installed (see packages/arch-core.txt).
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# GNOME keyring — provides a Secrets Service and SSH agent for GUI apps.
exec-once = gnome-keyring-daemon --start --components=secrets,ssh
