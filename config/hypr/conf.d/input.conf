input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

# gestures: workspace_swipe removed in Hyprland 0.45 — touchpad swipe not
# needed in a VM. Re-add if running on bare metal with a touchpad.
