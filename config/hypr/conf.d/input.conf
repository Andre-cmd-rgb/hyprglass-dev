input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity  = 0

    # Laptop touchpad — ignored on desktops / VMs without a touchpad device.
    touchpad {
        natural_scroll         = true
        disable_while_typing   = true
        tap-to-click           = true
        scroll_factor          = 1.0
        drag_lock              = false
    }
}

# ── Trackpad gestures (Hyprland 0.51+ syntax) ───────────────────────────────
# workspace_swipe / workspace_swipe_fingers were removed in Hyprland 0.51.
# New format: gesture = <fingers>, <direction>, <action>
# Ignored on devices without a multitouch trackpad (VMs, desktops).
gestures {
    gesture = 3, horizontal, workspace
}
