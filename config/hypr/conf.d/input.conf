input {
    kb_layout  = us
    kb_variant =
    kb_options =
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
        scroll_factor        = 1.0
        drag_lock            = false
    }
}

gestures {
    gesture = 3, horizontal, workspace
}
