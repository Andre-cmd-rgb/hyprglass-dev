# Hyprglass floating Settings and utility windows
windowrule = float on,          match:class ^(hyprglass-settings|hyprglass-float)$
windowrule = size 980 680,      match:class ^(hyprglass-settings|hyprglass-float)$, match:float true
windowrule = center on,         match:class ^(hyprglass-settings|hyprglass-float)$
windowrule = opacity 0.96 0.92, match:class ^(hyprglass-settings|hyprglass-float)$

windowrule = float on,          match:class ^(pavucontrol|nm-connection-editor|blueman-manager|org.gnome.Settings)$
windowrule = center on,         match:class ^(pavucontrol|nm-connection-editor|blueman-manager|org.gnome.Settings)$
windowrule = size 900 620,      match:class ^(pavucontrol|nm-connection-editor|blueman-manager|org.gnome.Settings)$, match:float true

windowrule = suppress_event maximize, match:class .*

layerrule = blur on,        match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
