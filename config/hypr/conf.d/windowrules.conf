# ── Hyprglass floating TUI windows ─────────────────────────────────────────
# windowrulev2 was removed in Hyprland 0.53; use windowrule with match:class.
windowrule = float on,          match:class ^hyprglass-float$
windowrule = size 920 620,      match:class ^hyprglass-float$, match:float true
windowrule = center on,         match:class ^hyprglass-float$
windowrule = opacity 0.94 0.90, match:class ^hyprglass-float$

# ── Global rules ────────────────────────────────────────────────────────────
# Suppress maximize requests from apps (let the tiling layout decide).
windowrule = suppress_event maximize, match:class .*

# ── Waybar blur ─────────────────────────────────────────────────────────────
# layerrule old format (layerrule = blur, waybar) was removed in 0.53.
# ignore_alpha 0 = skip fully-transparent pixels (same as old ignorezero).
layerrule = blur on,       match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
