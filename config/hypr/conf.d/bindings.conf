$mod         = SUPER
$terminal    = kitty
$fileManager = nautilus
$launcher    = fuzzel
$settings    = kitty --class hyprglass-settings --title "Hyprglass Settings" -e hyprglass settings

# Applications
bind = $mod,       RETURN,  exec, $terminal
bind = $mod,       SPACE,   exec, $launcher
bind = $mod,       E,       exec, $fileManager
bind = $mod,       comma,   exec, $settings
bind = $mod,       I,       exec, $settings
bind = $mod SHIFT, L,       exec, hyprlock
bind = $mod SHIFT, S,       exec, grim -g "$(slurp)" - | wl-copy

# Windows
bind = $mod,       Q,       killactive
bind = $mod,       F,       fullscreen
bind = $mod,       T,       togglefloating
bind = $mod,       P,       pseudo

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# Move windows
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d

# Resize submap
bind  = $mod, R, submap, resize
submap = resize
binde = , right, resizeactive,  30 0
binde = , left,  resizeactive, -30 0
binde = , up,    resizeactive,  0 -30
binde = , down,  resizeactive,  0  30
binde = , L,     resizeactive,  30 0
binde = , H,     resizeactive, -30 0
binde = , K,     resizeactive,  0 -30
binde = , J,     resizeactive,  0  30
bind  = , Return, submap, reset
bind  = , Escape, submap, reset
submap = reset

# Workspaces
bind = $mod,       1, workspace, 1
bind = $mod,       2, workspace, 2
bind = $mod,       3, workspace, 3
bind = $mod,       4, workspace, 4
bind = $mod,       5, workspace, 5
bind = $mod,       6, workspace, 6
bind = $mod,       7, workspace, 7
bind = $mod,       8, workspace, 8
bind = $mod,       9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Mouse window management
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind   = $mod, F9,  exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind   = $mod, F10, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind   = $mod, F11, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind   = $mod, F5, exec, brightnessctl set 5%-
bind   = $mod, F6, exec, brightnessctl set +5%

# Media controls
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioStop,  exec, playerctl stop
bind  = $mod, F7, exec, playerctl previous
bind  = $mod, F8, exec, playerctl play-pause

# Centralized Hyprglass surface
bind = $mod, W,       exec, $settings
bind = $mod, B,       exec, $settings
bind = $mod, M,       exec, $settings
bind = $mod, A,       exec, $settings
bind = $mod, D,       exec, $settings
bind = $mod, X,       exec, $settings
bind = $mod SHIFT, P, exec, hyprglass-powermenu
bind = $mod, slash,   exec, kitty --class hyprglass-settings --title "Hyprglass Shortcuts" -e sh -lc 'less ~/.config/hyprglass/docs/shortcuts.md'
