# ── hyprpaper wallpaper configuration ────────────────────────────────────────
# preload must list every image used by wallpaper directives.
preload = ~/.config/hypr/assets/wallpapers/hyprglass-dusk.png

# wallpaper = <monitor>, <path>
# Empty monitor name means "apply to all monitors".
wallpaper = , ~/.config/hypr/assets/wallpapers/hyprglass-dusk.png

splash = false
