general {
    hide_cursor = true
}

background {
    monitor     =
    path        = ~/.config/hypr/assets/wallpapers/hyprglass-dusk.png
    blur_passes = 2
    blur_size   = 7
}

label {
    monitor     =
    text        = cmd[update:1000] date +"%H:%M"
    color       = rgba(242, 242, 236, 0.96)
    font_size   = 72
    font_family = JetBrainsMono Nerd Font
    position    = 0, 90
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] date +"%A, %d %B"
    color       = rgba(165, 173, 186, 0.95)
    font_size   = 16
    font_family = JetBrainsMono Nerd Font
    position    = 0, 30
    halign      = center
    valign      = center
}

input-field {
    monitor           =
    size              = 300, 48
    outline_thickness = 1
    dots_size         = 0.22
    dots_spacing      = 0.24
    outer_color       = rgba(142, 168, 255, 0.62)
    inner_color       = rgba(15, 17, 21, 0.72)
    font_color        = rgba(242, 242, 236, 0.96)
    fade_on_empty     = false
    placeholder_text  = unlock
    position          = 0, -55
    halign            = center
    valign            = center
}
