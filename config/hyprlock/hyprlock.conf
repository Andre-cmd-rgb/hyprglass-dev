general { hide_cursor = true }
background { monitor = ; path = ~/.config/hypr/assets/wallpapers/hyprglass-dusk.png; blur_passes = 2; blur_size = 6 }
label { monitor = ; text = cmd[update:1000] date +"%H:%M"; color = rgba(219,234,254,0.95); font_size = 72; font_family = JetBrainsMono Nerd Font; position = 0, 90; halign = center; valign = center }
label { monitor = ; text = cmd[update:60000] date +"%A, %d %B"; color = rgba(148,163,184,0.95); font_size = 16; font_family = JetBrainsMono Nerd Font; position = 0, 30; halign = center; valign = center }
input-field { monitor = ; size = 280, 48; outline_thickness = 1; dots_size = 0.22; dots_spacing = 0.24; outer_color = rgba(129,140,248,0.55); inner_color = rgba(13,18,38,0.72); font_color = rgba(219,234,254,0.95); fade_on_empty = false; text = unlock; position = 0, -55; halign = center; valign = center }
